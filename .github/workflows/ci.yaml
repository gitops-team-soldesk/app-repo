# .github/workflows/ci.yaml
name: CI Pipeline

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 904053119728.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: gitops-app

permissions:
  id-token: write
  contents: read
  security-events: write  # Trivy SARIF 업로드용

jobs:
  # ============================================
  # Job 1: Build & Push
  # ============================================
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}
      full_image: ${{ steps.build.outputs.full_image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::904053119728:role/gitops-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        id: build
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          DATE=$(date +%y%m%d)
          IMAGE_TAG="v1.0.0-${DATE}-${SHORT_SHA}"

          FULL_IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"

          docker build -t ${FULL_IMAGE} .

          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "full_image=${FULL_IMAGE}" >> $GITHUB_OUTPUT

      # ============================================
      # 🔴 Trivy 스캔
      # ============================================
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.build.outputs.full_image }}
          format: 'table'
          # 🟡 exit-code 설정
          # '1': CRITICAL 취약점 있으면 빌드 실패
          # '0': 경고만 표시하고 계속 진행
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # SARIF 리포트 (GitHub Security 탭)
      - name: Run Trivy for SARIF
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.build.outputs.full_image }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Push Docker image
        run: |
          docker push ${{ steps.build.outputs.full_image }}

          # latest 태그
          docker tag ${{ steps.build.outputs.full_image }} \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

  # ============================================
  # Job 2: Update config-repo
  # ============================================
  update-config:
    name: Update config-repo
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout config-repo
        uses: actions/checkout@v4
        with:
          repository: gitops-team-soldesk/config-repo
          token: ${{ secrets.CONFIG_REPO_PAT }}
          path: config-repo

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update image tag
        env:
          NEW_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          cd config-repo/CD/k8s/overlays/dev

          kustomize edit set image \
            ghcr.io/stefanprodan/podinfo=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${NEW_TAG}

      - name: Commit and push
        env:
          NEW_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          cd config-repo
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore: Update image to ${NEW_TAG} (Trivy scanned)"
          git push