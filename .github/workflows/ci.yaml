# .github/workflows/ci.yaml
name: CI Pipeline

on:
  push:
    branches: [main]
    paths-ignore: ['**.md', 'docs/**']
  pull_request:
    branches: [main]

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 904053119728.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: gitops-app

permissions:
  id-token: write
  contents: read
  security-events: write

jobs:
  # ============================================
  # Job 1: Build & Test (PR + Push 공통)
  # ============================================
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      full_image: ${{ steps.meta.outputs.full }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image metadata
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          DATE=$(date +%y%m%d)
          TAG="v1.0.0-${DATE}-${SHORT_SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "full=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${TAG}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::904053119728:role/gitops-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: docker build -t ${{ steps.meta.outputs.full }} .

      # ============================================
      # Trivy 스캔 (exit-code: 0 → D8에서 1로 변경)
      # ============================================
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.full }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          exit-code: '0'              # D7: 경고만, D8: '1'로 변경
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      # ============================================
      # 🔴 PR일 때는 여기서 종료
      # ============================================
      - name: PR build summary
        if: github.event_name == 'pull_request'
        run: |
          echo "🛑 PR 빌드 완료: ECR 푸시 생략"
          echo "✅ 빌드 테스트 통과"
          echo "✅ Trivy 스캔 완료"

  # ============================================
  # Job 2: Push to ECR (main push만)
  # ============================================
  push-to-ecr:
    name: Push to ECR
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::904053119728:role/gitops-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker image
        run: |
          FULL_IMAGE="${{ needs.build-and-test.outputs.full_image }}"
          IMAGE_TAG="${{ needs.build-and-test.outputs.image_tag }}"
          
          docker build -t ${FULL_IMAGE} .
          docker push ${FULL_IMAGE}
          
          # latest 태그도 푸시
          docker tag ${FULL_IMAGE} ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          
          echo "✅ Pushed: ${IMAGE_TAG}"

  # ============================================
  # Job 3: Update config-repo (dev)
  # ============================================
  update-config-dev:
    name: Update config-repo (dev)
    runs-on: ubuntu-latest
    needs: push-to-ecr
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout config-repo
        uses: actions/checkout@v4
        with:
          repository: gitops-team-2024/config-repo
          token: ${{ secrets.CONFIG_REPO_PAT }}
          path: config-repo

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update dev image tag
        run: |
          NEW_TAG="${{ needs.push-to-ecr.outputs.image_tag || needs.build-and-test.outputs.image_tag }}"
          
          cd config-repo/k8s/overlays/dev
          kustomize edit set image \
            ghcr.io/stefanprodan/podinfo=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${NEW_TAG}

      - name: Commit and push
        run: |
          cd config-repo
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore(dev): Update image to ${{ needs.build-and-test.outputs.image_tag }}"
          git push