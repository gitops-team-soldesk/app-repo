# .github/workflows/deploy-prod.yaml
name: Deploy to Production

on:
  # 🔴 태그 릴리스만 트리거
  push:
    tags:
      - 'v*.*.*'

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 904053119728.dkr.ecr.ap-northeast-2.amazonaws.com
  ECR_REPOSITORY: gitops-app

permissions:
  id-token: write
  contents: read

jobs:
  # ============================================
  # Job 1: Build & Push (태그 버전)
  # ============================================
  build-and-push:
    name: Build and Push Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get tag version
        id: tag
        run: |
          # v1.0.0 → 1.0.0
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${TAG_VERSION}" >> $GITHUB_OUTPUT
          echo "📦 Release version: ${TAG_VERSION}"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::904053119728:role/gitops-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker image
        run: |
          TAG_VERSION=${{ steps.tag.outputs.version }}
          FULL_IMAGE="${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${TAG_VERSION}"

          docker build -t ${FULL_IMAGE} .
          docker push ${FULL_IMAGE}

          echo "✅ Pushed: ${TAG_VERSION}"

  # ============================================
  # Job 2: Update config-repo (prod)
  # ============================================
  update-config-prod:
    name: Update config-repo (prod)
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Get tag version
        id: tag
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          echo "version=${TAG_VERSION}" >> $GITHUB_OUTPUT

      - name: Checkout config-repo
        uses: actions/checkout@v4
        with:
          repository: gitops-team-2024/config-repo
          token: ${{ secrets.CONFIG_REPO_PAT }}
          path: config-repo

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update prod image tag
        run: |
          TAG_VERSION=${{ steps.tag.outputs.version }}

          cd config-repo/CD/k8s/overlays/prod
          kustomize edit set image \
            ghcr.io/stefanprodan/podinfo=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${TAG_VERSION}

      - name: Commit and push
        run: |
          TAG_VERSION=${{ steps.tag.outputs.version }}

          cd config-repo
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git diff --staged --quiet || git commit -m "chore(prod): Release ${TAG_VERSION}"
          git push

      - name: Notify
        run: |
          echo "🚀 Production config updated!"
          echo "Version: ${{ steps.tag.outputs.version }}"
          echo ""
          echo "⚠️ ArgoCD에서 수동 Sync 필요!"
          echo "argocd app sync podinfo-prod"